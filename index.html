<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you</title>
<link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="stage" id="stage">
  <div class="stars"></div>
  <div class="leaves-layer" id="leavesLayer"></div>

  <aside class="message-panel" id="messagePanel">
    <p class="message-label">for you</p>
    <p class="message-text" id="messageText"></p>
  </aside>

  <div class="heart-wrap" id="heartWrap">
    <button class="heart-btn" id="heartBtn" aria-label="Tap the heart">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>
    <span class="hint">tap the heart</span>
  </div>
</div>

<script src="JS/script.js"></script>
</body>
</html>
